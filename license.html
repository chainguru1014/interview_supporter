<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>License Activation - Interview Assistant</title>
    <style>
        :root {
            --bg-primary: #0d0d12;
            --bg-secondary: #151520;
            --bg-card: #1c1c28;
            --bg-input: #13131d;
            --text-primary: #ffffff;
            --text-secondary: #7a7a8c;
            --text-muted: #4a4a5a;
            --accent-start: #6366f1;
            --accent-mid: #8b5cf6;
            --accent-end: #d946ef;
            --border-color: #2a2a3c;
            --error-color: #f43f5e;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
        }

        /* Subtle animated gradient background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 24px;
            position: relative;
            z-index: 1;
            -webkit-app-region: no-drag;
        }

        .license-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px 32px 28px;
            text-align: center;
        }

        /* App icon with gradient */
        .app-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-mid) 50%, var(--accent-end) 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.25);
        }

        .app-icon svg {
            width: 38px;
            height: 38px;
            fill: white;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* Input styling */
        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .license-input {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.125rem;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-weight: 500;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        .license-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 3px;
        }

        .license-input:hover {
            border-color: #3a3a4c;
        }

        .license-input:focus {
            border-color: var(--accent-start);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .license-input.error {
            border-color: var(--error-color);
            animation: shake 0.4s ease-in-out;
        }

        .license-input.error:focus {
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.15);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Button styling */
        .activate-btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-mid) 50%, var(--accent-end) 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .activate-btn:hover:not(:disabled) {
            background-position: 100% 0;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.35);
        }

        .activate-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .activate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .activate-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.25);
            border-radius: 8px;
            color: var(--error-color);
            font-size: 0.8rem;
            display: none;
            text-align: left;
        }

        .error-message.visible {
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.2s ease;
        }

        .error-message svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            fill: var(--error-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: var(--accent-start);
        }

        .version {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'SF Mono', 'Consolas', monospace;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="license-card">
            <!-- Chat bubble icon -->
            <div class="app-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16ZM7 9H9V11H7V9ZM11 9H13V11H11V9ZM15 9H17V11H15V9Z"/>
                </svg>
            </div>

            <h1>Interview Assistant</h1>
            <p class="subtitle">Enter your license key to activate</p>

            <div class="input-wrapper">
                <input
                    type="text"
                    id="licenseKey"
                    class="license-input"
                    placeholder="XXXX-XXXX-XXXX-XXXX"
                    maxlength="19"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="characters"
                    spellcheck="false"
                >
            </div>

            <button id="activateBtn" class="activate-btn">
                <span class="spinner"></span>
                <span class="btn-text">Activate License</span>
            </button>

            <div id="errorMessage" class="error-message">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span id="errorText"></span>
            </div>

            <div class="footer">
                <span class="footer-text">Need a key? Contact support</span>
                <span class="version" id="versionText">v1.1.0</span>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('licenseKey');
        const btn = document.getElementById('activateBtn');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const versionText = document.getElementById('versionText');

        // Format input with dashes as user types
        input.addEventListener('input', (e) => {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            const parts = value.match(/.{1,4}/g) || [];
            e.target.value = parts.join('-').substring(0, 19);

            // Clear error state on input
            input.classList.remove('error');
            errorDiv.classList.remove('visible');
        });

        // Handle paste event
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const cleaned = pastedText.toUpperCase().replace(/[^A-Z0-9]/g, '');
            const parts = cleaned.match(/.{1,4}/g) || [];
            input.value = parts.join('-').substring(0, 19);
            input.classList.remove('error');
            errorDiv.classList.remove('visible');
        });

        // Show error
        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.add('visible');
            input.classList.add('error');
            input.focus();
        }

        // Set loading state
        function setLoading(isLoading) {
            btn.disabled = isLoading;
            btn.classList.toggle('loading', isLoading);
            btn.querySelector('.btn-text').textContent = isLoading ? 'Activating...' : 'Activate License';
        }

        // Handle activation
        async function handleActivation() {
            const key = input.value.trim();

            if (key.length === 0) {
                showError('Please enter a license key');
                return;
            }

            if (key.length !== 19) {
                showError('Incomplete key. Format: XXXX-XXXX-XXXX-XXXX');
                return;
            }

            const pattern = /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
            if (!pattern.test(key)) {
                showError('Invalid key format');
                return;
            }

            setLoading(true);

            try {
                const result = await window.electronAPI.activateLicense(key);

                if (!result.success) {
                    showError(result.error || 'Invalid license key');
                    setLoading(false);
                }
                // Success = app restarts automatically
            } catch (error) {
                showError('Connection error. Please try again.');
                setLoading(false);
            }
        }

        // Event listeners
        btn.addEventListener('click', handleActivation);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleActivation();
        });

        // Focus input and get version on load
        window.addEventListener('DOMContentLoaded', async () => {
            input.focus();

            try {
                if (window.electronAPI?.getAppVersion) {
                    const version = await window.electronAPI.getAppVersion();
                    versionText.textContent = `v${version}`;
                }
            } catch {}
        });
    </script>
</body>
</html>
