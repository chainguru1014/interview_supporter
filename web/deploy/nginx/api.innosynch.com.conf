# Reverse proxy + HTTPS + CORS for the backend API.
#   https://api.innosynch.com  ->  http://127.0.0.1:5052
#
# The admin frontend (https://admin.innosynch.com) calls this over HTTPS to
# avoid the mixed-content block (HTTPS page cannot call http://IP:5052).
#
# After enabling, run:  sudo certbot --nginx -d api.innosynch.com
# certbot rewrites this into an HTTPS (443) block + HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api.innosynch.com;

    client_max_body_size 30M;

    location / {
        # Allow the innosynch HTTPS frontends (admin, dpp, interview).
        # Edit the regex to add/remove allowed origins.
        set $cors_origin "";
        if ($http_origin ~* "^https://(admin|dpp|interview)\.innosynch\.com$") {
            set $cors_origin $http_origin;
        }

        # Preflight (OPTIONS) — answer directly, don't hit the backend.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Type   "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }

        # Strip any CORS headers the backend may already send, then set our own,
        # so the browser never sees duplicate/conflicting values.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;

        proxy_pass http://127.0.0.1:5052;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
