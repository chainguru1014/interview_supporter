# WebSocket upgrade helper. Copy to /etc/nginx/conf.d/ so it loads in the
# http {} context. It defines the $connection_upgrade variable used by the
# admin/dpp proxy configs to support WebSocket connections.
#
#   sudo cp web/deploy/nginx/websocket-map.conf /etc/nginx/conf.d/websocket-map.conf
#
# NOTE: if `sudo nginx -t` later reports that $connection_upgrade is already
# defined, your setup already has this map — just delete this file:
#   sudo rm /etc/nginx/conf.d/websocket-map.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
