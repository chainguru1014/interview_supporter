# Reverse proxy for the Interview Assistant web app.
#   interview.innosynch.com  ->  http://127.0.0.1:3002  (the Node app via pm2)
#
# This file starts as HTTP (port 80) only. After you enable it, run:
#     sudo certbot --nginx -d interview.innosynch.com
# certbot automatically rewrites this into an HTTPS (443) server block,
# adds the certificate paths, and creates an HTTP->HTTPS redirect.
#
# See web/deploy/DEPLOY.md for the full step-by-step.

server {
    listen 80;
    listen [::]:80;
    server_name interview.innosynch.com;

    # Audio segments / base64 screenshots can be a few MB; allow headroom.
    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Critical for this app's live streaming (SSE) answers ---
        proxy_buffering   off;     # stream tokens word-by-word, don't buffer
        proxy_cache       off;
        proxy_read_timeout 300s;   # long answers can stream for a while
        proxy_send_timeout 300s;
    }
}
