# Reverse proxy:  dpp.innosynch.com  ->  http://127.0.0.1:3001
# (your existing "dpp" project running on port 3001)
#
# After enabling, run:  sudo certbot --nginx -d dpp.innosynch.com
# certbot rewrites this into an HTTPS (443) block + HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name dpp.innosynch.com;

    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for SPA dev-server live reload, etc.)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
